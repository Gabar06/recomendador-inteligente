{% extends "./base.html" %}

{% block title %} Sucursal {% endblock %}

{% block body %}
<div class="row">
    <div class="col-md-4 "style="margin-top:30px">
        <h2>Nueva Sucursal</h2>
        <div class="card">
            <div class="card-body">
                <form action="SucRegistrar" method="POST">{% csrf_token %}
                    <div class="form-group">
                        Dirección:
                        <input type="text" id="txtDireccion" name="txtDireccion" class="form-control" placeholder="Direccion"
                            maxlength="50" required></br>
                    </div>
                    <div class="form-group">
                        Nr_Sucursal:
                        <input type="text" id="numNr_Sucursal" name="numNr_Sucursal" class="form-control" placeholder="Nr_Sucursal"
                            required></br>
                    </div>
                    <div class="form-group">
                        <button type="submit" class="btn btn-success btn-block text-white" >Agregar</button>
                        <a  class="btn btn-primary " id="cerrar" href="/Suc">Cerrar</a>
                    </div>
                </form>
            </div>
        </div>
        </br>
    </div>
</div>
{% endblock %}
