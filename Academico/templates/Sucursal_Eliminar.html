{% extends "./base.html" %}

{% block title %} Sucursal {% endblock %}

{% block body %}

<div class="row" style="margin-top:30px">
    <div class="col-sm-12">
        <div class="panel panel-warning">
            <div class="panel-heading">
                <h4>Eliminar Sucursal</h4>

            </div>
            <div class="panel-body">
                <div class="alert alert-danger">
                    ¿Desea Eliminar la Sucursal?
                </div>
                <form action="/SucEliminar/{{sucursal.id}}" method="POST">{% csrf_token %}
                    <label>Dirección:</label>
                    <input type="text" class="form-control" name="txtDireccion" value="{{sucursal.direccion}}" /></br>
                    <button type="submit" class="btn btn-danger btnEliminar">Eliminar</button>
                    <a class="btn btn-warning" href="/Suc">Volver</a>
                </form>

            </div>
        </div>
    </div>

</div>

{% endblock %}
